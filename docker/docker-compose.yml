# Developer compose file — builds from source.
# For the published GHCR image, see deploy/docker-compose.yml instead.

services:
  grackle:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        GRACKLE_VERSION: ${GRACKLE_VERSION:-latest}
    container_name: grackle
    ports:
      - "7434:7434"   # gRPC
      - "3000:3000"   # Web UI + WebSocket
      - "7435:7435"   # MCP
      - "7433:7433"   # Local PowerLine
    volumes:
      - grackle-data:/data                                               # Persistent DB, Neo4j, API key
      # WARNING: Grants the container root-equivalent access to the host Docker daemon.
      # Required for the Docker adapter (DooD pattern). Remove if not using Docker environments.
      - /var/run/docker.sock:/var/run/docker.sock
      # ── Agent file-based credential mounts ──
      # Required only if you use file-based credentials. The local adapter does NOT push
      # credential files via gRPC — runtimes read them directly from the filesystem.
      # As an alternative, you can configure auth via env vars (e.g. ANTHROPIC_API_KEY,
      # OPENAI_API_KEY, COPILOT_GITHUB_TOKEN/GH_TOKEN/GITHUB_TOKEN). Omit any mount you
      # don't need (e.g. skip .copilot if not using Copilot).
      - "${HOME}/.claude:/home/node/.claude:ro"                          # Claude auth + config (RO — redirected via CLAUDE_CONFIG_DIR)
      - "${HOME}/.copilot:/home/node/.copilot"                           # Copilot auth + session state (writable — no config dir override)
      - "${HOME}/.codex:/home/node/.codex"                               # Codex auth + skills cache (writable — no config dir override)
      # - "${HOME}/.config/goose:/home/node/.config/goose:ro"            # Goose auth (uncomment if using Goose)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # GitHub CLI auth — set GH_TOKEN before running docker compose:
      #   export GH_TOKEN=$(gh auth token)
      - GH_TOKEN=${GH_TOKEN:-}
      # Docker adapter networking — sibling containers join this network
      # so the server can reach them directly (required for DooD).
      - GRACKLE_DOCKER_NETWORK=grackle
      # Container name used by sibling containers to reach this server's MCP/gRPC.
      - GRACKLE_DOCKER_HOST=grackle
      # Host address for qdrant-search MCP (runs on host, accessed by agents in container).
      - QDRANT_MCP_HOST=${QDRANT_MCP_HOST:-host.docker.internal}
      # Knowledge graph is enabled by default (Neo4j runs inside the container).
      # To use an external Neo4j, set GRACKLE_NEO4J_URL and the embedded one won't start.
      # To disable knowledge entirely, set GRACKLE_KNOWLEDGE_ENABLED=false.
    networks:
      - grackle
    restart: unless-stopped

networks:
  grackle:
    name: grackle

volumes:
  grackle-data:
