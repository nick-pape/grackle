syntax = "proto3";

package grackle;

// ─── Common Types ───────────────────────────────────────────

message Empty {}

message EnvironmentId {
  string id = 1;
}

message SessionId {
  string id = 1;
}

// ─── Enums ──────────────────────────────────────────────────

enum EnvironmentStatus {
  ENVIRONMENT_STATUS_UNSPECIFIED = 0;
  ENVIRONMENT_STATUS_DISCONNECTED = 1;
  ENVIRONMENT_STATUS_CONNECTING = 2;
  ENVIRONMENT_STATUS_CONNECTED = 3;
  ENVIRONMENT_STATUS_SLEEPING = 4;
  ENVIRONMENT_STATUS_ERROR = 5;
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_PENDING = 1;
  SESSION_STATUS_RUNNING = 2;
  SESSION_STATUS_WAITING_INPUT = 3;
  SESSION_STATUS_SUSPENDED = 4;
  SESSION_STATUS_COMPLETED = 5;
  SESSION_STATUS_FAILED = 6;
  SESSION_STATUS_KILLED = 7;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_TEXT = 1;
  EVENT_TYPE_TOOL_USE = 2;
  EVENT_TYPE_TOOL_RESULT = 3;
  EVENT_TYPE_ERROR = 4;
  EVENT_TYPE_STATUS = 5;
  EVENT_TYPE_SYSTEM = 6;
}

// ─── Environment ────────────────────────────────────────────

message Environment {
  string id = 1;
  string display_name = 2;
  string adapter_type = 3;
  string adapter_config = 4;     // JSON
  string default_runtime = 5;
  bool bootstrapped = 6;
  string status = 7;
  string last_seen = 8;
  string env_info = 9;           // JSON from sidecar GetInfo
  string created_at = 10;
}

message EnvironmentList {
  repeated Environment environments = 1;
}

message AddEnvironmentRequest {
  string display_name = 1;
  string adapter_type = 2;
  string adapter_config = 3;     // JSON
  string default_runtime = 4;
}

message ProvisionEvent {
  string stage = 1;
  string message = 2;
  double progress = 3;           // 0.0 - 1.0
}

// ─── Session ────────────────────────────────────────────────

message Session {
  string id = 1;
  string env_id = 2;
  string runtime = 3;
  string runtime_session_id = 4;
  string prompt = 5;
  string model = 6;
  string status = 7;
  string log_path = 8;
  int32 turns = 9;
  string started_at = 10;
  string suspended_at = 11;
  string ended_at = 12;
  string error = 13;
}

message SessionList {
  repeated Session sessions = 1;
}

message SessionFilter {
  string env_id = 1;             // empty = all
  string status = 2;             // empty = all
}

message SpawnRequest {
  string env_id = 1;
  string prompt = 2;
  string model = 3;
  int32 max_turns = 4;
  string runtime = 5;            // empty = use env default
}

message ResumeRequest {
  string session_id = 1;
}

message InputMessage {
  string session_id = 1;
  string text = 2;
}

// ─── Streaming Events ───────────────────────────────────────

message SessionEvent {
  string session_id = 1;
  string type = 2;
  string timestamp = 3;
  string content = 4;
  string raw = 5;                // JSON, optional original payload
}

// ─── Tokens ─────────────────────────────────────────────────

message TokenEntry {
  string name = 1;
  string type = 2;
  string env_var = 3;
  string file_path = 4;
  string value = 5;
  string expires_at = 6;
}

message TokenList {
  repeated TokenInfo tokens = 1;
}

message TokenInfo {
  string name = 1;
  string type = 2;
  string env_var = 3;
  string file_path = 4;
  string expires_at = 5;
  // No value — never expose to clients
}

// ─── Service ────────────────────────────────────────────────

service Grackle {
  // Environment management
  rpc ListEnvironments(Empty) returns (EnvironmentList);
  rpc AddEnvironment(AddEnvironmentRequest) returns (Environment);
  rpc RemoveEnvironment(EnvironmentId) returns (Empty);
  rpc ProvisionEnvironment(EnvironmentId) returns (stream ProvisionEvent);
  rpc StopEnvironment(EnvironmentId) returns (Empty);
  rpc DestroyEnvironment(EnvironmentId) returns (Empty);

  // Agent sessions
  rpc SpawnAgent(SpawnRequest) returns (Session);
  rpc ResumeAgent(ResumeRequest) returns (Session);
  rpc SendInput(InputMessage) returns (Empty);
  rpc KillAgent(SessionId) returns (Empty);
  rpc ListSessions(SessionFilter) returns (SessionList);

  // Streaming
  rpc StreamSession(SessionId) returns (stream SessionEvent);
  rpc StreamAll(Empty) returns (stream SessionEvent);

  // Token management
  rpc SetToken(TokenEntry) returns (Empty);
  rpc ListTokens(Empty) returns (TokenList);
}
