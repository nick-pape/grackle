syntax = "proto3";

package grackle;

// ─── Common Types ───────────────────────────────────────────

message Empty {}

message EnvironmentId {
  string id = 1;
}

message SessionId {
  string id = 1;
}

// ─── Enums ──────────────────────────────────────────────────

enum EnvironmentStatus {
  ENVIRONMENT_STATUS_UNSPECIFIED = 0;
  ENVIRONMENT_STATUS_DISCONNECTED = 1;
  ENVIRONMENT_STATUS_CONNECTING = 2;
  ENVIRONMENT_STATUS_CONNECTED = 3;
  ENVIRONMENT_STATUS_SLEEPING = 4;
  ENVIRONMENT_STATUS_ERROR = 5;
}

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_PENDING = 1;
  SESSION_STATUS_RUNNING = 2;
  SESSION_STATUS_WAITING_INPUT = 3;
  SESSION_STATUS_SUSPENDED = 4;
  SESSION_STATUS_COMPLETED = 5;
  SESSION_STATUS_FAILED = 6;
  SESSION_STATUS_KILLED = 7;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_TEXT = 1;
  EVENT_TYPE_TOOL_USE = 2;
  EVENT_TYPE_TOOL_RESULT = 3;
  EVENT_TYPE_ERROR = 4;
  EVENT_TYPE_STATUS = 5;
  EVENT_TYPE_SYSTEM = 6;
  EVENT_TYPE_FINDING = 7;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_ASSIGNED = 2;
  TASK_STATUS_IN_PROGRESS = 3;
  TASK_STATUS_REVIEW = 4;
  TASK_STATUS_DONE = 5;
  TASK_STATUS_FAILED = 6;
}

enum ProjectStatus {
  PROJECT_STATUS_UNSPECIFIED = 0;
  PROJECT_STATUS_ACTIVE = 1;
  PROJECT_STATUS_ARCHIVED = 2;
}

enum TokenType {
  TOKEN_TYPE_UNSPECIFIED = 0;
  TOKEN_TYPE_ENV_VAR = 1;
  TOKEN_TYPE_FILE = 2;
}

// ─── Environment ────────────────────────────────────────────

message Environment {
  string id = 1;
  string display_name = 2;
  string adapter_type = 3;
  string adapter_config = 4;     // JSON
  string default_runtime = 5;
  bool bootstrapped = 6;
  EnvironmentStatus status = 7;
  string last_seen = 8;
  string env_info = 9;           // JSON from PowerLine GetInfo
  string created_at = 10;
}

message EnvironmentList {
  repeated Environment environments = 1;
}

message AddEnvironmentRequest {
  string display_name = 1;
  string adapter_type = 2;
  string adapter_config = 3;     // JSON
  string default_runtime = 4;
}

message ProvisionEvent {
  string stage = 1;
  string message = 2;
  double progress = 3;           // 0.0 - 1.0
}

// ─── Session ────────────────────────────────────────────────

message Session {
  string id = 1;
  string environment_id = 2;
  string runtime = 3;
  string runtime_session_id = 4;
  string prompt = 5;
  string model = 6;
  SessionStatus status = 7;
  string log_path = 8;
  int32 turns = 9;
  string started_at = 10;
  string suspended_at = 11;
  string ended_at = 12;
  string error = 13;
}

message SessionList {
  repeated Session sessions = 1;
}

message SessionFilter {
  string environment_id = 1;     // empty = all
  SessionStatus status = 2;      // UNSPECIFIED = all
}

message SpawnRequest {
  string environment_id = 1;
  string prompt = 2;
  string model = 3;
  int32 max_turns = 4;
  string runtime = 5;            // empty = use env default
  string branch = 6;             // Branch for worktree (empty = skip)
  string system_context = 7;     // Prepended to prompt (task desc + findings)
}

message ResumeRequest {
  string session_id = 1;
}

message InputMessage {
  string session_id = 1;
  string text = 2;
}

// ─── Streaming Events ───────────────────────────────────────

message SessionEvent {
  string session_id = 1;
  EventType type = 2;
  string timestamp = 3;
  string content = 4;
  string raw = 5;                // JSON, optional original payload
}

// ─── Tokens ─────────────────────────────────────────────────

message TokenEntry {
  string name = 1;
  TokenType type = 2;
  string env_var = 3;
  string file_path = 4;
  string value = 5;
  string expires_at = 6;
}

message TokenList {
  repeated TokenInfo tokens = 1;
}

message TokenInfo {
  string name = 1;
  TokenType type = 2;
  string env_var = 3;
  string file_path = 4;
  string expires_at = 5;
  // No value — never expose to clients
}

message TokenName {
  string name = 1;
}

// ─── Projects ──────────────────────────────────────────────

message Project {
  string id = 1;
  string name = 2;
  string description = 3;
  string repo_url = 4;
  string default_environment_id = 5;
  ProjectStatus status = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ProjectList {
  repeated Project projects = 1;
}

message CreateProjectRequest {
  string name = 1;
  string description = 2;
  string repo_url = 3;
  string default_environment_id = 4;
}

message ProjectId {
  string id = 1;
}

// ─── Tasks ─────────────────────────────────────────────────

message Task {
  string id = 1;
  string project_id = 2;
  string title = 3;
  string description = 4;
  TaskStatus status = 5;
  string branch = 6;
  string environment_id = 7;
  string session_id = 8;
  repeated string depends_on = 9;
  string assigned_at = 10;
  string started_at = 11;
  string completed_at = 12;
  string review_notes = 13;
  string created_at = 14;
  string updated_at = 15;
  int32 sort_order = 16;
  string parent_task_id = 17;        // empty for root tasks
  int32 depth = 18;                  // 0 for root, parent.depth + 1
  repeated string child_task_ids = 19;  // populated by server on read
  bool can_decompose = 20;
}

message TaskList {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  string project_id = 1;
  string title = 2;
  string description = 3;
  string environment_id = 4;
  repeated string depends_on = 5;
  string parent_task_id = 6;
  optional bool can_decompose = 7;
}

message TaskId {
  string id = 1;
}

message UpdateTaskRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  TaskStatus status = 4;
  string environment_id = 5;
  repeated string depends_on = 6;
  string review_notes = 7;
}

message StartTaskRequest {
  string task_id = 1;
  string runtime = 2;
  string model = 3;
}

// ─── Findings ──────────────────────────────────────────────

message Finding {
  string id = 1;
  string project_id = 2;
  string task_id = 3;
  string session_id = 4;
  string category = 5;
  string title = 6;
  string content = 7;
  repeated string tags = 8;
  string created_at = 9;
}

message FindingList {
  repeated Finding findings = 1;
}

message PostFindingRequest {
  string project_id = 1;
  string task_id = 2;
  string session_id = 3;
  string category = 4;
  string title = 5;
  string content = 6;
  repeated string tags = 7;
}

message QueryFindingsRequest {
  string project_id = 1;
  repeated string categories = 2;
  repeated string tags = 3;
  int32 limit = 4;
}

// ─── GitHub Import ────────────────────────────────────

message ImportGitHubIssuesRequest {
  string project_id = 1;
  string repo = 2;           // "owner/repo"
  string label = 3;          // optional label filter
  string state = 4;          // "open" or "closed"
  string environment_id = 5; // optional env to assign
}

message ImportGitHubIssuesResponse {
  int32 imported = 1;
  int32 linked = 2;
  int32 skipped = 3;
}

// ─── Task Diff ─────────────────────────────────────────────

message GetTaskDiffRequest {
  string task_id = 1;
}

message TaskDiff {
  string task_id = 1;
  string branch = 2;
  string diff = 3;
  repeated string changed_files = 4;
  int32 additions = 5;
  int32 deletions = 6;
}

// ─── Service ────────────────────────────────────────────────

service Grackle {
  // Environment management
  rpc ListEnvironments(Empty) returns (EnvironmentList);
  rpc AddEnvironment(AddEnvironmentRequest) returns (Environment);
  rpc RemoveEnvironment(EnvironmentId) returns (Empty);
  rpc ProvisionEnvironment(EnvironmentId) returns (stream ProvisionEvent);
  rpc StopEnvironment(EnvironmentId) returns (Empty);
  rpc DestroyEnvironment(EnvironmentId) returns (Empty);

  // Agent sessions
  rpc SpawnAgent(SpawnRequest) returns (Session);
  rpc ResumeAgent(ResumeRequest) returns (Session);
  rpc SendInput(InputMessage) returns (Empty);
  rpc KillAgent(SessionId) returns (Empty);
  rpc ListSessions(SessionFilter) returns (SessionList);

  // Streaming
  rpc StreamSession(SessionId) returns (stream SessionEvent);
  rpc StreamAll(Empty) returns (stream SessionEvent);

  // Token management
  rpc SetToken(TokenEntry) returns (Empty);
  rpc ListTokens(Empty) returns (TokenList);
  rpc DeleteToken(TokenName) returns (Empty);

  // Projects
  rpc ListProjects(Empty) returns (ProjectList);
  rpc CreateProject(CreateProjectRequest) returns (Project);
  rpc GetProject(ProjectId) returns (Project);
  rpc ArchiveProject(ProjectId) returns (Empty);

  // Tasks
  rpc ListTasks(ProjectId) returns (TaskList);
  rpc CreateTask(CreateTaskRequest) returns (Task);
  rpc GetTask(TaskId) returns (Task);
  rpc UpdateTask(UpdateTaskRequest) returns (Task);
  rpc StartTask(StartTaskRequest) returns (Session);
  rpc ApproveTask(TaskId) returns (Task);
  rpc RejectTask(UpdateTaskRequest) returns (Task);
  rpc DeleteTask(TaskId) returns (Empty);

  // Findings
  rpc PostFinding(PostFindingRequest) returns (Finding);
  rpc QueryFindings(QueryFindingsRequest) returns (FindingList);

  // GitHub Import
  rpc ImportGitHubIssues(ImportGitHubIssuesRequest) returns (ImportGitHubIssuesResponse);

  // Diff
  rpc GetTaskDiff(GetTaskDiffRequest) returns (TaskDiff);
}
