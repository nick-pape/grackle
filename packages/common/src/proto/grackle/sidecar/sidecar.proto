syntax = "proto3";

package grackle.sidecar;

// ─── Types ──────────────────────────────────────────────────

message Empty {}

message SessionId {
  string id = 1;
}

message EnvInfo {
  string hostname = 1;
  string os = 2;
  string node_version = 3;
  repeated string available_runtimes = 4;
  int64 uptime_seconds = 5;
}

message Pong {
  int64 timestamp = 1;
}

message SpawnRequest {
  string session_id = 1;        // Server-assigned session ID
  string runtime = 2;           // "claude-code" | "stub" | ...
  string prompt = 3;
  string model = 4;
  int32 max_turns = 5;
  string branch = 6;              // Branch for worktree (empty = skip)
  string worktree_base_path = 7;  // Repo root, e.g. "/workspace"
  string system_context = 8;      // Prepended to prompt (task desc + findings)
  string project_id = 9;          // So MCP server knows which project
  string task_id = 10;            // So MCP server knows which task
}

message ResumeRequest {
  string session_id = 1;
  string runtime_session_id = 2; // Runtime-native session ID
  string runtime = 3;
}

message InputMessage {
  string session_id = 1;
  string text = 2;
}

message AgentEvent {
  string session_id = 1;
  string type = 2;               // "text" | "tool_use" | "tool_result" | "error" | "status" | "system"
  string timestamp = 3;
  string content = 4;
  string raw = 5;                // JSON, optional
}

message SessionInfo {
  string session_id = 1;
  string runtime = 2;
  string status = 3;
}

message SessionList {
  repeated SessionInfo sessions = 1;
}

// ─── Token Injection ────────────────────────────────────────

message TokenItem {
  string name = 1;
  string type = 2;               // "env_var" | "file"
  string env_var = 3;
  string file_path = 4;
  string value = 5;
}

message TokenBundle {
  repeated TokenItem tokens = 1;
}

// ─── Worktree ──────────────────────────────────────────────

message WorktreeCleanupRequest {
  string branch = 1;
  string worktree_base_path = 2;
}

// ─── Diff ──────────────────────────────────────────────────

message DiffRequest {
  string branch = 1;
  string base_branch = 2;
  string worktree_base_path = 3;
}

message DiffResponse {
  string diff = 1;
  repeated string changed_files = 2;
  int32 additions = 3;
  int32 deletions = 4;
}

// ─── Service ────────────────────────────────────────────────

service GrackleSidecar {
  rpc GetInfo(Empty) returns (EnvInfo);
  rpc Spawn(SpawnRequest) returns (stream AgentEvent);
  rpc Resume(ResumeRequest) returns (stream AgentEvent);
  rpc SendInput(InputMessage) returns (Empty);
  rpc Kill(SessionId) returns (Empty);
  rpc ListSessions(Empty) returns (SessionList);
  rpc Ping(Empty) returns (Pong);
  rpc PushTokens(TokenBundle) returns (Empty);
  rpc CleanupWorktree(WorktreeCleanupRequest) returns (Empty);
  rpc GetDiff(DiffRequest) returns (DiffResponse);
}
