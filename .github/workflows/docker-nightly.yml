name: Docker Nightly

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC (05:00 CST / 06:00 CDT)
  workflow_dispatch:        # Manual trigger

concurrency:
  group: docker-nightly
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=nightly-{{date 'YYYYMMDD'}}

      # Resolve version from the repo's version-policies.json so we
      # always build the Docker image for the version this commit knows
      # about, not whatever was last published to npm.
      - name: Resolve Grackle version from repo
        id: version
        run: echo "version=$(node -p "require('./common/config/rush/version-policies.json')[0].version")" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: GRACKLE_VERSION=${{ steps.version.outputs.version }}
          pull: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
