name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Cache Neo4j Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-neo4j-5-community

      - name: Load or pull Neo4j image
        run: |
          if [ -f /tmp/docker-images/neo4j.tar ]; then
            docker load < /tmp/docker-images/neo4j.tar
          else
            docker pull neo4j:5-community
            mkdir -p /tmp/docker-images
            docker save neo4j:5-community -o /tmp/docker-images/neo4j.tar
          fi

      - name: Start Neo4j
        run: |
          docker run -d --name neo4j \
            -e NEO4J_AUTH=neo4j/grackle-dev \
            -p 7687:7687 \
            neo4j:5-community

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            if docker exec neo4j cypher-shell -u neo4j -p grackle-dev 'RETURN 1' 2>/dev/null; then
              echo "Neo4j is ready"
              exit 0
            fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 5
          done
          echo "Neo4j failed to start"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify change logs
        if: github.event_name == 'pull_request'
        run: node common/scripts/install-run-rush.js change --verify

      - name: Block major version bumps
        if: github.event_name == 'pull_request'
        run: |
          if grep -r '"type": "major"' common/changes/ 2>/dev/null; then
            echo "::error::Major version bumps are blocked. Use patch or minor."
            exit 1
          fi

      - name: Lint E2E test tags
        run: |
          chmod +x .github/scripts/lint-e2e-tags.sh
          .github/scripts/lint-e2e-tags.sh tests/e2e-tests/tests

      - name: Detect E2E test scope
        if: github.event_name == 'pull_request'
        id: e2e-scope
        run: |
          chmod +x .github/scripts/detect-e2e-tags.sh
          TAGS=$(.github/scripts/detect-e2e-tags.sh "origin/${{ github.event.pull_request.base.ref }}")
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "E2E scope: $TAGS"

      - name: Build and test
        uses: ./.github/actions/build-and-test
        with:
          e2e-tags: ${{ steps.e2e-scope.outputs.tags }}
