name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get weekly cache key
        id: week
        run: echo "key=$(date +%Y-%W)" >> "$GITHUB_OUTPUT"

      - name: Cache Neo4j Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-neo4j-5-community-${{ steps.week.outputs.key }}
          restore-keys: |
            docker-neo4j-5-community-

      - name: Load or pull Neo4j image
        run: |
          if [ -f /tmp/docker-images/neo4j.tar ]; then
            docker load < /tmp/docker-images/neo4j.tar
          else
            docker pull neo4j:5-community
            mkdir -p /tmp/docker-images
            docker save neo4j:5-community -o /tmp/docker-images/neo4j.tar
          fi

      - name: Start Neo4j
        run: |
          docker run -d --name neo4j \
            -e NEO4J_AUTH=neo4j/grackle-dev \
            -p 7687:7687 \
            neo4j:5-community

      - name: Wait for Neo4j
        run: |
          for i in $(seq 1 30); do
            if docker exec neo4j cypher-shell -u neo4j -p grackle-dev 'RETURN 1' 2>/dev/null; then
              echo "Neo4j is ready"
              exit 0
            fi
            echo "Waiting for Neo4j... ($i/30)"
            sleep 5
          done
          echo "Neo4j failed to start"
          exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify change logs
        if: github.event_name == 'pull_request'
        run: node common/scripts/install-run-rush.js change --verify

      - name: Block major version bumps
        if: github.event_name == 'pull_request'
        run: |
          if grep -r '"type": "major"' common/changes/ 2>/dev/null; then
            echo "::error::Major version bumps are blocked. Use patch or minor."
            exit 1
          fi

      - name: Build and test
        uses: ./.github/actions/build-and-test

      - name: E2E test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results
          path: tests/e2e-tests/test-results/e2e-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: BuildPulse — upload test results
        if: always() && github.repository == 'nick-pape/grackle' && vars.BUILDPULSE_ACCOUNT_ID != ''
        uses: buildpulse/buildpulse-action@v0.12.0
        with:
          account: ${{ vars.BUILDPULSE_ACCOUNT_ID }}
          repository: ${{ vars.BUILDPULSE_REPOSITORY_ID }}
          path: tests/e2e-tests/test-results/e2e-results.xml
          key: ${{ secrets.BUILDPULSE_ACCESS_KEY_ID }}
          secret: ${{ secrets.BUILDPULSE_SECRET_ACCESS_KEY }}
