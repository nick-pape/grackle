name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT is required to create PRs and merge them
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Checkout main so version bumps apply on top of the latest commit
      - name: Checkout main
        run: git checkout main && git pull origin main

      - name: Install
        run: node common/scripts/install-run-rush.js install

      # rush version --bump creates a temp branch, pushes it, then tries to
      # fast-forward main directly. The direct push fails due to branch
      # protection, so we let it fail and merge via PR instead.
      - name: Bump versions
        id: bump
        run: |
          output=$(node common/scripts/install-run-rush.js version --bump --target-branch main 2>&1) || true
          echo "$output"

          branch=$(echo "$output" | grep -oP 'version/bump-\d+' | head -1)
          if [ -z "$branch" ]; then
            echo "::error::Failed to extract version bump branch name"
            exit 1
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Merge version bump into main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          pr_url=$(gh pr create \
            --base main \
            --head "${{ steps.bump.outputs.branch }}" \
            --title "chore: bump versions [skip ci]" \
            --body "Automated version bump from publish workflow.")

          gh pr merge "$pr_url" --squash --admin --delete-branch

      - name: Checkout updated main
        run: git checkout main && git pull origin main

      - name: Build
        run: node common/scripts/install-run-rush.js build

      - name: Publish to npm
        run: node common/scripts/install-run-rush.js publish --include-all --publish --set-access-level public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
