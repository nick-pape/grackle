name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Check for publishable changefiles BEFORE building. CI already
      # validates the build on push to main, so there's no point running
      # a full build+test cycle here if there's nothing to publish.
      - name: Consolidate changefiles and sync nextBump
        id: changefile_check
        run: |
          # Read mainProject from version-policies.json (single source of truth)
          POLICY_FILE="common/config/rush/version-policies.json"
          MAIN_PROJECT=$(node -p "
            const v = JSON.parse(require('fs').readFileSync('$POLICY_FILE', 'utf8'));
            const p = v.find(pol => pol.policyName === 'grackle');
            if (!p) { console.error('Policy not found'); process.exit(1); }
            p.mainProject;
          ")
          # e.g. "@grackle-ai/cli" → "cli"
          MAIN_PKG_DIR=$(echo "$MAIN_PROJECT" | sed 's|.*/||')
          MAIN_DIR="common/changes/$MAIN_PROJECT"

          mapfile -t changefiles < <(find common/changes/ -name '*.json' 2>/dev/null)
          if [ ${#changefiles[@]} -eq 0 ]; then
            echo "No changefiles found, nothing to publish"
            echo "has_changefiles=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found ${#changefiles[@]} changefile(s)"

          # Determine the highest bump type across all changefiles.
          # Priority: major (blocked) > minor > patch > none (skip).
          if grep -rq '"type":[[:space:]]*"major"' common/changes/; then
            echo "::error::Major version bump found in changefiles — blocked by policy"
            exit 1
          fi
          highest="none"
          if grep -rq '"type":[[:space:]]*"patch"' common/changes/; then
            highest="patch"
          fi
          if grep -rq '"type":[[:space:]]*"minor"' common/changes/; then
            highest="minor"
          fi
          # All changefiles are "none" — nothing to publish
          if [ "$highest" = "none" ]; then
            echo "All changefiles are type \"none\", nothing to publish"
            echo "has_changefiles=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changefiles=true" >> "$GITHUB_OUTPUT"

          # Consolidate non-mainProject changefiles into the mainProject
          # directory so rush version --bump actually consumes them.
          mkdir -p "$MAIN_DIR"
          for f in "${changefiles[@]}"; do
            pkg_dir=$(basename "$(dirname "$f")")
            if [ "$pkg_dir" != "$MAIN_PKG_DIR" ]; then
              echo "Consolidating $(basename "$f") from $pkg_dir → $MAIN_PKG_DIR"
              CHANGEFILE="$f" MAIN_PROJECT="$MAIN_PROJECT" node -e "
                const fs = require('fs');
                const filePath = process.env.CHANGEFILE;
                const mainProject = process.env.MAIN_PROJECT;
                const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
                data.packageName = mainProject;
                for (const c of data.changes) { c.packageName = mainProject; }
                fs.writeFileSync(filePath, JSON.stringify(data, null, 2) + '\n');
              "
              mv_dest="$MAIN_DIR/${pkg_dir}_$(basename "$f")"
              if [ -e "$mv_dest" ]; then
                echo "::error::Destination changefile $mv_dest already exists; refusing to overwrite"
                exit 1
              fi
              mv "$f" "$mv_dest"
              # Remove empty parent directories
              parent=$(dirname "$f")
              rmdir --ignore-fail-on-non-empty -p "$parent" 2>/dev/null || true
            fi
          done

          # Update nextBump in version-policies.json so the actual semver
          # increment matches what the changefiles requested.
          HIGHEST="$highest" node -e "
            const fs = require('fs');
            const p = '$POLICY_FILE';
            const v = JSON.parse(fs.readFileSync(p, 'utf8'));
            const policy = v.find(pol => pol.policyName === 'grackle');
            if (!policy) { console.error('Policy not found in ' + p); process.exit(1); }
            policy.nextBump = process.env.HIGHEST;
            fs.writeFileSync(p, JSON.stringify(v, null, 2) + '\n');
          "
          echo "Set nextBump to $highest"

      # Only build if we have something to publish. CI on main already
      # validates the build, so this is purely to produce dist/ for publishing.
      - name: Build and test
        if: steps.changefile_check.outputs.has_changefiles == 'true'
        uses: ./.github/actions/build-and-test

      # Run rush version --bump WITHOUT --target-branch so it only modifies
      # files on disk (no branch creation, no commits, no push). We handle
      # the git operations ourselves to avoid Rush's [skip ci] commits and
      # temp branch workflow that conflicts with branch protection rulesets.
      - name: Bump versions
        id: bump
        if: steps.changefile_check.outputs.has_changefiles == 'true'
        run: |
          node common/scripts/install-run-rush.js version --bump

          # Check if rush actually changed anything
          if git diff --quiet && git diff --cached --quiet; then
            echo "No version changes detected"
            echo "has_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_bump=true" >> "$GITHUB_OUTPUT"
          fi

      # Commit and push the version bump directly to main. The GH_PAT from
      # checkout belongs to an admin who can bypass the branch ruleset.
      # [skip ci] prevents an infinite CD trigger loop.
      - name: Push version bump
        if: steps.bump.outputs.has_bump == 'true'
        run: |
          git add -A
          git commit -m "chore: bump versions [skip ci]"
          git push origin main

      # No rebuild needed — rush publish packages the existing dist/ output
      # with the bumped package.json version. Compiled JS is version-independent.
      - name: Publish to npm
        if: steps.bump.outputs.has_bump == 'true'
        run: node common/scripts/install-run-rush.js publish --include-all --publish --set-access-level public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.bump.outputs.has_bump == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          version=$(node -p "require('./packages/cli/package.json').version")
          gh release create "v${version}" \
            --target main \
            --title "v${version}" \
            --generate-notes

  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: common/temp/pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Rush install
        run: node common/scripts/install-run-rush.js install

      - name: Build docs site
        run: node common/scripts/install-run-rush.js build -t @grackle-ai/docs-site

      - name: Build web demo
        env:
          VITE_DEMO_MODE: "true"
          VITE_BASE_URL: /grackle/demo/
        run: node common/scripts/install-run-rush.js build -t @grackle-ai/web

      - name: Copy web demo into docs output
        run: cp -r packages/web/dist apps/docs-site/build/demo

      - name: Build component library (Storybook)
        env:
          STORYBOOK_BASE: /grackle/components/
        run: |
          cd packages/web-components
          npx storybook build --quiet

      - name: Copy Storybook into docs output
        run: cp -r packages/web-components/storybook-static apps/docs-site/build/components

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs-site/build

      - id: deployment
        uses: actions/deploy-pages@v4
