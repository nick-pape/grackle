name: Run E2E Shard
description: Run a Playwright E2E test shard with cached dependencies

inputs:
  project:
    description: Playwright project name (chromium or knowledge)
    required: true
  shard:
    description: 'Shard specification (e.g., "1/2") or empty for no sharding'
    required: false
    default: ""
  artifact-name:
    description: Name for uploaded test results artifact
    required: true
  workers:
    description: Override E2E_WORKERS (number of Playwright workers per shard)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Cache Rush build cache
      uses: actions/cache@v4
      with:
        path: common/temp/build-cache
        key: rush-build-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          rush-build-${{ runner.os }}-

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: common/temp/pnpm-store
        key: pnpm-${{ runner.os }}-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: huggingface-${{ runner.os }}-${{ hashFiles('packages/knowledge-core/package.json') }}
        restore-keys: |
          huggingface-${{ runner.os }}-

    - name: Rush install
      shell: bash
      run: node common/scripts/install-run-rush.js install

    - name: Rush build
      shell: bash
      run: node common/scripts/install-run-rush.js build

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install --with-deps chromium
      working-directory: tests/e2e-tests

    - name: Install Playwright system deps
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: npx playwright install-deps chromium
      working-directory: tests/e2e-tests

    - name: Run E2E tests
      shell: bash
      working-directory: tests/e2e-tests
      env:
        E2E_WORKERS: ${{ inputs.workers }}
      run: |
        ARGS="--project=${{ inputs.project }}"
        if [ -n "${{ inputs.shard }}" ]; then
          ARGS="$ARGS --shard=${{ inputs.shard }}"
        fi
        npx playwright test $ARGS

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: tests/e2e-tests/test-results/e2e-results.xml
        if-no-files-found: ignore
        retention-days: 30
