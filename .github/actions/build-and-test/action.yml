name: Build and Test
description: Shared install → build → Playwright → test steps

inputs:
  skip-e2e:
    description: Skip E2E tests (Playwright install + rush e2e)
    required: false
    default: "false"
  e2e-tags:
    description: Comma-separated Playwright tags to filter E2E tests (empty or "all" = run all)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Cache Rush build cache
      uses: actions/cache@v4
      with:
        path: common/temp/build-cache
        key: rush-build-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          rush-build-${{ runner.os }}-

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: common/temp/pnpm-store
        key: pnpm-${{ runner.os }}-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: huggingface-${{ runner.os }}-${{ hashFiles('packages/knowledge/package.json') }}
        restore-keys: |
          huggingface-${{ runner.os }}-

    - name: Rush install
      shell: bash
      run: node common/scripts/install-run-rush.js install

    - name: Rush build
      shell: bash
      run: node common/scripts/install-run-rush.js build

    - name: Cache Playwright browsers
      if: inputs.skip-e2e != 'true'
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      if: inputs.skip-e2e != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install --with-deps chromium
      working-directory: tests/e2e-tests

    - name: Install Playwright system deps
      if: inputs.skip-e2e != 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: npx playwright install-deps chromium
      working-directory: tests/e2e-tests

    - name: Run unit tests
      shell: bash
      run: node common/scripts/install-run-rush.js test --verbose

    - name: Build Storybook
      shell: bash
      run: STORYBOOK_DISABLE_TELEMETRY=1 npx storybook build --quiet
      working-directory: packages/web

    - name: Test Storybook
      shell: bash
      run: |
        npx concurrently -k -s first -n "SB,TEST" \
          "npx http-server storybook-static --port 6006 --silent" \
          "npx wait-on tcp:6006 && npx test-storybook --url http://127.0.0.1:6006"
      working-directory: packages/web
      env:
        STORYBOOK_DISABLE_TELEMETRY: "1"

    - name: Run E2E tests
      if: inputs.skip-e2e != 'true'
      shell: bash
      env:
        E2E_TAGS: ${{ inputs.e2e-tags }}
      run: node common/scripts/install-run-rush.js e2e --verbose
