name: Build and Test
description: Shared install → build → Playwright → test steps

inputs:
  skip-e2e:
    description: Skip E2E tests (Playwright install + rush e2e)
    required: false
    default: "false"
  e2e-tags:
    description: Comma-separated Playwright tags to filter E2E tests (empty or "all" = run all)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Cache Rush build cache
      uses: actions/cache@v4
      with:
        path: common/temp/build-cache
        key: rush-build-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          rush-build-${{ runner.os }}-

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: common/temp/pnpm-store
        key: pnpm-${{ runner.os }}-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-

    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: huggingface-${{ runner.os }}-${{ hashFiles('packages/knowledge-core/package.json') }}
        restore-keys: |
          huggingface-${{ runner.os }}-

    - name: Rush install
      shell: bash
      run: node common/scripts/install-run-rush.js install

    - name: Rush build
      shell: bash
      run: node common/scripts/install-run-rush.js build

    - name: Cache Playwright browsers
      if: inputs.skip-e2e != 'true'
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('common/config/rush/pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      if: inputs.skip-e2e != 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install --with-deps chromium
      working-directory: tests/e2e-tests

    - name: Install Playwright system deps
      if: inputs.skip-e2e != 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: npx playwright install-deps chromium
      working-directory: tests/e2e-tests

    - name: Run unit tests
      shell: bash
      run: node common/scripts/install-run-rush.js test --verbose

    - name: Run E2E tests
      if: inputs.skip-e2e != 'true'
      shell: bash
      env:
        E2E_TAGS: ${{ inputs.e2e-tags }}
      run: node common/scripts/install-run-rush.js e2e --verbose

    - name: Upload E2E test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: tests/e2e-tests/test-results/e2e-results.xml
        if-no-files-found: ignore
        retention-days: 30
